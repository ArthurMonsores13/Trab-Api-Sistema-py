version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: postgres_db_faculdade
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker123
      POSTGRES_DB: sgta_academico
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: